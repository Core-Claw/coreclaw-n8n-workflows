<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">CoreClaw n8n Workflows</title>
  <desc id="desc">Production n8n templates that turn the CoreClaw Google Maps scraper into closed business loops.</desc>
  <defs>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#F7F2E8" stroke-opacity=".055"/>
    </pattern>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#74E0C1"/><stop offset="1" stop-color="#43B9B0"/>
    </linearGradient>
    <clipPath id="frame"><rect width="1200" height="390" rx="32"/></clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <rect width="1200" height="390" rx="32" fill="#121827"/>
    <rect width="1200" height="390" rx="32" fill="url(#grid)"/>
    <circle cx="1107" cy="56" r="112" fill="#FF7458" fill-opacity=".08"/>
    <circle cx="1048" cy="340" r="138" fill="#63D3BE" fill-opacity=".06"/>

    <g transform="translate(68 48)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <text x="0" y="16" fill="#A9B1C2" font-size="17" font-weight="700" letter-spacing="3">N8N WORKFLOWS · CORECLAW V2</text>
      <rect x="0" y="34" width="56" height="6" rx="3" fill="#FF7458"/>
      <text x="0" y="132" fill="#F7F2E8" font-size="74" font-weight="780" letter-spacing="-3">scrape → score</text>
      <text x="0" y="206" fill="#F7F2E8" font-size="66" font-weight="760" letter-spacing="-3">→ sheets → email</text>
      <rect id="title-highlight" x="0" y="224" width="310" height="18" rx="4" fill="#63D3BE" fill-opacity=".82"/>
      <text x="0" y="278" fill="#D6DCE7" font-size="26" font-weight="520">Closed business loops, not just runs.</text>
      <text x="0" y="322" fill="#7F8A9F" font-size="15" font-weight="650" letter-spacing="1.7">3 TEMPLATES · GOOGLE SHEETS · GMAIL · v2.30.4</text>
    </g>

    <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
      <g transform="translate(812 52) rotate(4 150 70)">
        <rect x="8" y="10" width="300" height="140" rx="18" fill="#080D17" fill-opacity=".38"/>
        <rect width="300" height="140" rx="18" fill="#F7F2E8"/>
        <rect x="20" y="20" width="48" height="8" rx="4" fill="#FF7458"/>
        <text x="20" y="50" fill="#121827" font-size="15" font-weight="760">n8n CANVAS</text>
        <g transform="translate(20 66)">
          <rect width="56" height="40" rx="10" fill="#FF7458"/><text x="28" y="25" text-anchor="middle" fill="#F7F2E8" font-size="11" font-weight="700">scrape</text>
          <path d="M56 20h14" stroke="#172033" stroke-width="3" stroke-linecap="round"/>
          <rect x="70" width="56" height="40" rx="10" fill="#6A62D9"/><text x="98" y="25" text-anchor="middle" fill="#F7F2E8" font-size="11" font-weight="700">score</text>
          <path d="M126 20h14" stroke="#172033" stroke-width="3" stroke-linecap="round"/>
          <rect x="140" width="56" height="40" rx="10" fill="#63D3BE"/><text x="168" y="25" text-anchor="middle" fill="#10313A" font-size="10" font-weight="700">Sheets</text>
          <path d="M196 20h14" stroke="#172033" stroke-width="3" stroke-linecap="round"/>
          <rect x="210" width="56" height="40" rx="10" fill="#182334"/><text x="238" y="25" text-anchor="middle" fill="#F7F2E8" font-size="10" font-weight="700">Gmail</text>
        </g>
      </g>
      <g transform="translate(700 188) rotate(-5 150 80)">
        <rect x="8" y="10" width="300" height="160" rx="20" fill="#080D17" fill-opacity=".4"/>
        <rect width="300" height="160" rx="20" fill="url(#mint)"/>
        <text x="22" y="40" fill="#10313A" font-size="16" font-weight="760">LEADS · GOOGLE SHEETS</text>
        <g transform="translate(22 54)" font-size="12" font-weight="650">
          <rect width="256" height="24" rx="6" fill="#10313A" fill-opacity=".1"/>
          <text x="10" y="16" fill="#10313A">name</text><text x="120" y="16" fill="#10313A">phone</text><text x="210" y="16" fill="#10313A">score</text>
          <rect y="30" width="256" height="24" rx="6" fill="#10313A" fill-opacity=".05"/>
          <text x="10" y="46" fill="#10313A" opacity=".85">HVAC Pro</text><text x="120" y="46" fill="#10313A" opacity=".85">212-…</text><text x="210" y="46" fill="#FF7458" font-weight="780">87</text>
          <rect y="60" width="256" height="24" rx="6" fill="#10313A" fill-opacity=".05"/>
          <text x="10" y="76" fill="#10313A" opacity=".85">CoolAir Co</text><text x="120" y="76" fill="#10313A" opacity=".85">646-…</text><text x="210" y="76" fill="#FF7458" font-weight="780">72</text>
        </g>
      </g>
      <g transform="translate(918 248) rotate(6 120 60)">
        <rect x="7" y="9" width="240" height="120" rx="16" fill="#080D17" fill-opacity=".4"/>
        <rect width="240" height="120" rx="16" fill="#6A62D9"/>
        <text x="18" y="36" fill="#F7F2E8" font-size="14" font-weight="760">GMAIL · SUMMARY</text>
        <text x="18" y="58" fill="#F7F2E8" fill-opacity=".75" font-size="11">Top-10 table + xlsx</text>
        <rect x="18" y="70" width="204" height="28" rx="8" fill="#F7F2E8" fill-opacity=".15"/>
        <text x="28" y="88" fill="#F7F2E8" font-size="11" font-weight="700">📎 leads.xlsx</text>
      </g>
    </g>
  </g>
</svg>
